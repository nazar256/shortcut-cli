name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and upload
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: '1.25.0'
      TAG: ${{ inputs.tag || github.ref_name }}
      PROJECT_NAME: shortcut-cli
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test ./...

      - name: Derive build metadata
        run: |
          echo "COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(git log -1 --format=%cI HEAD)" >> "$GITHUB_ENV"

      - name: Build release archives
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="${PROJECT_NAME}_${TAG}_${os}_${arch}"
            tmpdir="$(mktemp -d)"

            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build \
              -trimpath \
              -ldflags "-X github.com/nazar256/shortcut-cli/internal/cli.Version=${TAG} -X github.com/nazar256/shortcut-cli/internal/cli.Commit=${COMMIT} -X github.com/nazar256/shortcut-cli/internal/cli.BuildDate=${BUILD_DATE}" \
              -o "${tmpdir}/shortcut" \
              ./cmd/shortcut

            tar -C "${tmpdir}" -czf "dist/${name}.tar.gz" shortcut
            rm -rf "${tmpdir}"
          done

          (cd dist && sha256sum *.tar.gz | LC_ALL=C sort > "${PROJECT_NAME}_${TAG}_checksums.txt")

      - name: Include installer script
        run: cp install.sh dist/install.sh

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            gh release create "${TAG}" --draft --title "${TAG}" --notes "Release ${TAG}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(gh release view "${TAG}" --json isDraft --template '{{.isDraft}}')" != "true" ]; then
            echo "Refusing to overwrite assets on published release ${TAG}" >&2
            exit 1
          fi
          gh release upload "${TAG}" dist/* --clobber
